<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Academia Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #0c0c0e;
  --border: rgba(255,255,255,0.08);
  --text:  #f4f4f6;
  --muted: rgba(244,244,246,0.45);
  --font:  'Manrope', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}

.number {
  font-size: clamp(100px, 20vw, 180px);
  font-weight: 800;
  letter-spacing: -0.06em;
  line-height: 1;
  color: rgba(244,244,246,0.06);
  margin-bottom: -20px;
  animation: fadeUp 0.5s ease both;
}

.title {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 12px;
  animation: fadeUp 0.5s ease 0.06s both;
}

.sub {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.65;
  max-width: 360px;
  margin: 0 auto 36px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  animation: fadeUp 0.5s ease 0.14s both;
}

.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 10px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: opacity 0.2s, transform 0.15s;
}

.btn:hover  { opacity: 0.88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn-primary { background: var(--text); color: #0c0c0e; }

.btn-ghost {
  background: none;
  color: var(--muted);
  border: 1px solid rgba(255,255,255,0.13);
}

.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  border-top: 1px solid var(--border);
  padding: 18px 24px;
  display: flex;
  justify-content: center;
}

footer p {
  font-size: 12px;
  color: rgba(244,244,246,0.22);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

</style>
</head>
<body>

  <div class="number">404</div>

  <h1 class="title">Página no encontrada.</h1>
  <p class="sub">La página que buscas no existe o ha sido movida. Vuelve al inicio o accede a la clase gratuita.</p>

  <div class="actions">
    <a href="home.html" class="btn btn-primary">Volver al inicio</a>
    <a href="funnel-landing.html" class="btn btn-ghost">Ver clase gratuita</a>
  </div>

<footer>
  <p>2026 Academia Pro. Todos los derechos reservados.</p>
</footer>

</body>
</html>
